version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: SaaSBoilerplate_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword 
      POSTGRES_DB: SaaSBoilerplate_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - SaaSBoilerplate_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: SaaSBoilerplate_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@SaaSBoilerplate.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - SaaSBoilerplate_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: SaaSBoilerplate_api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=SaaSBoilerplate_dev;Username=postgres;Password=supersecretpassword
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - SaaSBoilerplate_network

volumes:
  postgres_data:

networks:
  SaaSBoilerplate_network:
    driver: bridge